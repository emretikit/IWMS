# PostgreSQL Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/iwms 
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Secret Key
jwt.secret=your-super-secret-key-that-is-long-enough-for-hs256

# Student Email Domain
app.student-email-domain=cs.hacettepe.edu.tr

# Allow Test Endpoints (for testing purposes)
app.allow-test-endpoints=true

# JWT Token gecerlilik suresi (Milisaniye cinsinden, ornegin 24 saat = 86400000)
jwt.expiration=86400000
file.upload-dir=uploads
