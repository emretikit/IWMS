# Server Configuration
server.port=${SERVER_PORT:8080}

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/iwms_db
spring.datasource.username=admin
spring.datasource.password=5432
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:change-this-secret-in-production-change-this-secret}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload Configuration
file.upload-dir=${FILE_UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# App toggles
app.allow-test-endpoints=${APP_ALLOW_TEST_ENDPOINTS:false}
app.student-email-domain=${APP_STUDENT_EMAIL_DOMAIN:cs.hacettepe.edu.tr}
